<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Results summary component</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <section class="result-panel">
        <p class="result-title">Your Result</p>
        <div class="score-wrapper">
          <p class="score">76</p>
          <p class="score-subtext">of 100</p>
        </div>
        <h1 class="result-score-title">Great</h1>
        <p class="result-description">You scored higher than 65% of the people who have taken these tests.</p>
      </section>

      <section class="summary-panel">
        <h2 class="summary-heading">Summary</h2>
        <div class="result-summary">
          <div class="summary-item reaction">
            <div class="summary-item__label">
              <span class="summary-item__icon"><img src="./assets/images/icon-reaction.svg" alt="Reaction icon" width="18" height="18"></span>
              <span class="summary-item__name">Reaction</span>
            </div>
            <span class="summary-item__score">80 / 100</span>
          </div>
          <div class="summary-item memory">
            <div class="summary-item__label">
              <span class="summary-item__icon"><img src="./assets/images/icon-memory.svg" alt="Memory icon" width="18" height="18"></span>
              <span class="summary-item__name">Memory</span>
            </div>
            <span class="summary-item__score">92 / 100</span>
          </div>
          <div class="summary-item verbal">
            <div class="summary-item__label">
              <span class="summary-item__icon"><img src="./assets/images/icon-verbal.svg" alt="Verbal icon" width="18" height="18"></span>
              <span class="summary-item__name">Verbal</span>
            </div>
            <span class="summary-item__score">61 / 100</span>
          </div>
          <div class="summary-item visual">
            <div class="summary-item__label">
              <span class="summary-item__icon"><img src="./assets/images/icon-visual.svg" alt="Visual icon" width="18" height="18"></span>
              <span class="summary-item__name">Visual</span>
            </div>
            <span class="summary-item__score">72 / 100</span>
          </div>
        </div>
        <button class="continue-button" type="button">Continue</button>
      </section>
    </div>

    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noreferrer">Frontend Mentor</a>. Coded by <a href="https://khothatsocodetribe.netlify.app" target="_blank" rel="noreferrer">Khothatso Ramotholo</a>.
    </div>
  </div>
  <script src="./app.js" defer></script>
</body>
</html>
